<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HP Paint Pro Studio</title>
    <style>
        :root {
            --bg-dark: #121217;
            --ui-panel: #1e1e26;
            --accent: #00f5ff;
            --danger: #ff4757;
            --border: #2d2d3a;
            --text-dim: #888;
        }

        /* 1. LAYOUT CHUẨN STUDIO */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; user-select: none; }
        body { background: var(--bg-dark); color: white; font-family: 'Inter', system-ui; height: 100vh; overflow: hidden; display: flex; }

        /* EXIT BUTTON - FIXED TO VIEWPORT */
        .exit-app {
            position: fixed; top: 15px; left: 15px; z-index: 10000;
            width: 40px; height: 40px; background: var(--danger);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: white; font-weight: bold; border: 2px solid rgba(255,255,255,0.2);
            transition: 0.2s; pointer-events: auto;
        }
        .exit-app:hover { transform: scale(1.1); filter: brightness(1.2); }

        /* 2. SIDEBAR CÔNG CỤ (LEFT) */
        .toolbar {
            width: 70px; background: var(--ui-panel); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 80px 0; gap: 20px; z-index: 999;
        }
        .t-btn {
            width: 46px; height: 46px; border-radius: 12px; border: none; background: transparent;
            color: var(--text-dim); font-size: 20px; transition: 0.2s; position: relative;
        }
        .t-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .t-btn.active { color: #000; background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .t-btn::after {
            content: attr(data-tooltip); position: absolute; left: 60px; top: 10px;
            background: #000; color: #fff; font-size: 10px; padding: 4px 8px;
            border-radius: 4px; opacity: 0; pointer-events: none; transition: 0.2s; white-space: nowrap;
        }
        .t-btn:hover::after { opacity: 1; left: 70px; }

        /* 3. MAIN CANVAS AREA */
        .viewport { flex-grow: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
        #canvas-stack { position: relative; width: 100%; height: 100%; background: #fff; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; outline: none; }
        #cursor-eye {
            position: fixed; pointer-events: none; z-index: 100000;
            border: 1px solid #fff; mix-blend-mode: difference; border-radius: 50%; transform: translate(-50%, -50%);
        }

        /* 4. LAYER & PROPERTIES PANEL (RIGHT) */
        .inspector {
            width: 300px; background: var(--ui-panel); border-left: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 999;
        }
        .panel-sec { padding: 20px; border-bottom: 1px solid var(--border); }
        .p-title { font-size: 10px; font-weight: 800; color: var(--accent); letter-spacing: 1.5px; margin-bottom: 15px; text-transform: uppercase; }

        /* Palette */
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .sw { width: 100%; aspect-ratio: 1; border-radius: 6px; border: 2px solid transparent; cursor: pointer; }
        .sw.active { border-color: #fff; transform: scale(1.1); }

        /* Sliders */
        .ctrl { margin-bottom: 15px; }
        .ctrl-lbl { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; }
        input[type="range"] { width: 100%; accent-color: var(--accent); background: #121217; height: 4px; border-radius: 2px; -webkit-appearance: none; }

        /* Layers List */
        .layer-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }
        .layer-item {
            background: #121217; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 10px;
            font-size: 12px; border: 1px solid transparent;
        }
        .layer-item.active { border-color: var(--accent); background: #1a1a25; }
        .layer-vis { font-size: 14px; opacity: 0.5; }

        /* Footer Actions */
        .actions { margin-top: auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-act { padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; transition: 0.2s; }
        .btn-save { background: var(--accent); color: #000; }
        .btn-clear { background: #2d2d3a; color: var(--danger); }

        /* 5. STATUS BAR */
        .status-bar {
            position: fixed; bottom: 0; left: 70px; right: 300px; height: 30px;
            background: #000; border-top: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 20px; font-size: 10px; color: #444;
        }
    </style>
</head>
<body>

    <a href="index.html" class="exit-app">✕</a>
    <div id="cursor-eye"></div>

    <aside class="toolbar">
        <button class="t-btn active" id="tool-brush" onclick="studio.setTool('brush')" data-tooltip="Brush (B)">🖌️</button>
        <button class="t-btn" id="tool-eraser" onclick="studio.setTool('eraser')" data-tooltip="Eraser (E)">🧼</button>
        <button class="t-btn" id="tool-fill" onclick="studio.setTool('fill')" data-tooltip="Bucket Fill (G)">🪣</button>
        <div style="height:1px; width:30px; background:var(--border);"></div>
        <button class="t-btn" onclick="studio.undo()" data-tooltip="Undo (Ctrl+Z)">↩️</button>
        <button class="t-btn" onclick="studio.redo()" data-tooltip="Redo (Ctrl+Y)">↪️</button>
    </aside>

    <main class="viewport" id="viewport">
        <div id="canvas-stack">
            <canvas id="layer-bg"></canvas>
            <canvas id="layer-1"></canvas>
            <canvas id="layer-ui"></canvas>
        </div>
    </main>

    <aside class="inspector">
        <div class="panel-sec">
            <div class="p-title">Color Palette</div>
            <div class="color-grid" id="palette"></div>
        </div>

        <div class="panel-sec">
            <div class="p-title">Brush Settings</div>
            <div class="ctrl">
                <div class="ctrl-lbl"><span>Size</span><span id="val-sz">20px</span></div>
                <input type="range" min="1" max="300" value="20" oninput="studio.updateProp('size', this.value)">
            </div>
            <div class="ctrl">
                <div class="ctrl-lbl"><span>Opacity</span><span id="val-op">100%</span></div>
                <input type="range" min="1" max="100" value="100" oninput="studio.updateProp('opacity', this.value)">
            </div>
            <div class="ctrl">
                <div class="ctrl-lbl"><span>Smoothing</span><span id="val-sm">0.5</span></div>
                <input type="range" min="0" max="100" value="50" oninput="studio.updateProp('smoothing', this.value/100)">
            </div>
        </div>

        <div class="panel-sec">
            <div class="p-title">Layers</div>
            <div class="layer-list">
                <div class="layer-item active">
                    <span class="layer-vis">👁️</span>
                    <span>Canvas Layer 1</span>
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn-act btn-clear" onclick="studio.clear()">RESET</button>
            <button class="btn-act btn-save" onclick="studio.export()">EXPORT PNG</button>
        </div>
    </aside>

    <div class="status-bar">
        ENGINE: HP_PRO_V3 | MODE: 2D_ACCELERATED | <span id="stats-xy" style="margin-left: 20px;">X: 0 Y: 0</span>
    </div>

    <script>
        const studio = {
            config: {
                colors: ['#00f5ff','#ff00c8','#ffee00','#2ecc71','#ff4757','#ffffff','#000000','#7000ff','#54a0ff','#ff9f43'],
                smoothing: 0.5
            },
            state: {
                isDrawing: false,
                tool: 'brush',
                color: '#00f5ff',
                size: 20,
                opacity: 1.0,
                history: [],
                redoStack: [],
                points: []
            },

            init() {
                this.cacheDOM();
                this.setupCanvases();
                this.renderPalette();
                this.bindEvents();
                this.saveState(); // Save initial blank state
                this.loop();
            },

            cacheDOM() {
                this.dom = {
                    main: document.getElementById('layer-1'),
                    bg: document.getElementById('layer-bg'),
                    ui: document.getElementById('layer-ui'),
                    viewport: document.getElementById('viewport'),
                    cursor: document.getElementById('cursor-eye'),
                    stats: document.getElementById('stats-xy')
                };
                this.ctx = this.dom.main.getContext('2d', { alpha: true });
                this.bgCtx = this.dom.bg.getContext('2d');
            },

            setupCanvases() {
                const resize = () => {
                    const w = this.dom.viewport.offsetWidth;
                    const h = this.dom.viewport.offsetHeight;
                    [this.dom.main, this.dom.bg, this.dom.ui].forEach(c => {
                        c.width = w;
                        c.height = h;
                    });
                    this.bgCtx.fillStyle = '#ffffff';
                    this.bgCtx.fillRect(0,0,w,h);
                };
                window.addEventListener('resize', resize);
                resize();
            },

            renderPalette() {
                const container = document.getElementById('palette');
                this.config.colors.forEach(c => {
                    const d = document.createElement('div');
                    d.className = 'sw' + (c === this.state.color ? ' active' : '');
                    d.style.background = c;
                    d.onclick = () => {
                        this.state.color = c;
                        document.querySelectorAll('.sw').forEach(s => s.classList.remove('active'));
                        d.classList.add('active');
                    };
                    container.appendChild(d);
                });
            },

            bindEvents() {
                const getCoords = (e) => {
                    const rect = this.dom.main.getBoundingClientRect();
                    return {
                        x: e.clientX - rect.left,
                        y: e.clientY - rect.top
                    };
                };

                const start = (e) => {
                    this.state.isDrawing = true;
                    this.state.points = [getCoords(e)];
                    this.state.redoStack = [];
                };

                const move = (e) => {
                    const coords = getCoords(e);
                    this.dom.stats.innerText = `X: ${Math.round(coords.x)} Y: ${Math.round(coords.y)}`;
                    
                    // Update Virtual Cursor
                    this.dom.cursor.style.left = e.clientX + 'px';
                    this.dom.cursor.style.top = e.clientY + 'px';
                    this.dom.cursor.style.width = this.state.size + 'px';
                    this.dom.cursor.style.height = this.state.size + 'px';

                    if (!this.state.isDrawing) return;
                    
                    this.state.points.push(coords);
                    this.draw();
                };

                const stop = () => {
                    if (this.state.isDrawing) this.saveState();
                    this.state.isDrawing = false;
                    this.state.points = [];
                };

                this.dom.ui.onmousedown = start;
                window.onmousemove = move;
                window.onmouseup = stop;
                
                // Keyboard Shortcuts
                window.onkeydown = (e) => {
                    if (e.ctrlKey && e.key === 'z') this.undo();
                    if (e.ctrlKey && e.key === 'y') this.redo();
                    if (e.key === 'b') this.setTool('brush');
                    if (e.key === 'e') this.setTool('eraser');
                };
            },

            draw() {
                if (this.state.points.length < 2) return;
                
                const p = this.state.points;
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';
                this.ctx.lineWidth = this.state.size;
                this.ctx.globalAlpha = this.state.opacity;

                if (this.state.tool === 'eraser') {
                    this.ctx.globalCompositeOperation = 'destination-out';
                } else {
                    this.ctx.globalCompositeOperation = 'source-over';
                    this.ctx.strokeStyle = this.state.color;
                }

                this.ctx.beginPath();
                this.ctx.moveTo(p[0].x, p[0].y);

                // THUẬT TOÁN LÀM MƯỢT NÉT VẼ (BÉZIER)
                for (let i = 1; i < p.length - 2; i++) {
                    const xc = (p[i].x + p[i + 1].x) / 2;
                    const yc = (p[i].y + p[i + 1].y) / 2;
                    this.ctx.quadraticCurveTo(p[i].x, p[i].y, xc, yc);
                }
                
                // Nét cuối
                if(p.length > 2) {
                    const last = p.length - 1;
                    this.ctx.quadraticCurveTo(p[last-1].x, p[last-1].y, p[last].x, p[last].y);
                }
                
                this.ctx.stroke();
            },

            updateProp(key, val) {
                this.state[key] = val;
                if(key === 'size') document.getElementById('val-sz').innerText = val + 'px';
                if(key === 'opacity') document.getElementById('val-op').innerText = val + '%';
            },

            setTool(t) {
                this.state.tool = t;
                document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('tool-' + t).classList.add('active');
            },

            saveState() {
                const data = this.dom.main.toDataURL();
                this.state.history.push(data);
                if (this.state.history.length > 20) this.state.history.shift();
            },

            undo() {
                if (this.state.history.length > 1) {
                    this.state.redoStack.push(this.state.history.pop());
                    const last = this.state.history[this.state.history.length - 1];
                    this.loadImg(last);
                }
            },

            redo() {
                if (this.state.redoStack.length > 0) {
                    const next = this.state.redoStack.pop();
                    this.state.history.push(next);
                    this.loadImg(next);
                }
            },

            loadImg(src) {
                const img = new Image();
                img.src = src;
                img.onload = () => {
                    this.ctx.clearRect(0, 0, this.dom.main.width, this.dom.main.height);
                    this.ctx.globalCompositeOperation = 'source-over';
                    this.ctx.drawImage(img, 0, 0);
                };
            },

            clear() {
                if(confirm("Xóa toàn bộ layer này?")) {
                    this.ctx.clearRect(0,0,this.dom.main.width, this.dom.main.height);
                    this.saveState();
                }
            },

            export() {
                const temp = document.createElement('canvas');
                temp.width = this.dom.main.width; temp.height = this.dom.main.height;
                const tCtx = temp.getContext('2d');
                tCtx.drawImage(this.dom.bg, 0, 0);
                tCtx.drawImage(this.dom.main, 0, 0);
                const a = document.createElement('a');
                a.download = 'hp_digital_art.png';
                a.href = temp.toDataURL();
                a.click();
            },

            loop() { requestAnimationFrame(() => this.loop()); }
        };

        window.onload = () => studio.init();
    </script>
</body>
</html>
