<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HP Game</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #0f0f1a;
  color: white;
}

/* ===== HEADER ===== */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 50px;
  background: rgba(20, 20, 35, 0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.logo {
  font-size: 24px;
  font-weight: bold;
  background: linear-gradient(90deg, #00f5ff, #ff00c8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.search-box input {
  padding: 8px 15px;
  border-radius: 20px;
  border: none;
  outline: none;
  background: #1e1e35;
  color: white;
}

/* ===== HERO ===== */
.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

.hero p {
  opacity: 0.7;
}

/* ===== GAME GRID ===== */
.container {
  padding: 40px 80px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 30px;
}

.game-card {
  background: linear-gradient(145deg, #1c1c2e, #24244a);
  border-radius: 20px;
  padding: 30px;
  text-align: center;
  cursor: pointer;
  transition: 0.4s ease;
  position: relative;
  overflow: hidden;
}

.game-card::before {
  content: "";
  position: absolute;
  width: 150%;
  height: 150%;
  background: radial-gradient(circle, rgba(0,255,255,0.15), transparent 60%);
  top: -50%;
  left: -50%;
  transform: rotate(25deg);
}

.game-card:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 20px 40px rgba(0,255,255,0.2);
}

.game-icon {
  font-size: 50px;
  margin-bottom: 20px;
}

.game-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 8px;
}

.game-desc {
  font-size: 14px;
  opacity: 0.6;
}

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 30px;
  opacity: 0.5;
  border-top: 1px solid rgba(255,255,255,0.1);
}
</style>

</head>
<body>

<header>
  <div class="logo">🎮 HP Game</div>
  <div class="search-box">
    <input type="text" placeholder="Tìm game...">
  </div>
</header>

<section class="hero">
  <h1>Chào mừng đến với HP Game</h1>
  <p>Những mini game vui vẻ do bạn phát triển 🚀</p>
</section>

<div class="container">

  <div class="game-card" onclick="window.open('geometrydash.html', '_blank')">
    <div class="game-icon">🟥</div>
    <div class="game-title">HP Dash</div>
    <div class="game-desc">Nhảy tránh chướng ngại vật</div>
  </div>

  <div class="game-card">
    <div class="game-icon">🐍</div>
    <div class="game-title">Rắn Săn Mồi</div>
    <div class="game-desc">Game cổ điển gây nghiện</div>
  </div>

  <div class="game-card">
    <div class="game-icon">🚀</div>
    <div class="game-title">Bắn Máy Bay</div>
    <div class="game-desc">Chiến đấu không gian</div>
  </div>

  <div class="game-card">
    <div class="game-icon">🎲</div>
    <div class="game-title">Sắp Ra Mắt</div>
    <div class="game-desc">Game mới đang phát triển</div>
  </div>

</div>

<footer>
  © 2026 HP Game | Made for fun 😎
</footer>

</body>
</html>
