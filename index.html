<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HP Game | Thế Giới Mini Game</title>
<style>
:root {
  --primary: #00f5ff;
  --secondary: #ff00c8;
  --bg: #050510;
  --card-bg: rgba(255, 255, 255, 0.05);
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body {
  background: var(--bg);
  background-image: radial-gradient(circle at 20% 30%, rgba(0, 245, 255, 0.05) 0%, transparent 40%);
  color: white; min-height: 100vh; overflow-x: hidden;
}
header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 8%; background: rgba(10, 10, 25, 0.8); backdrop-filter: blur(15px);
  position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}
.logo { font-size: 28px; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* Bảng điểm ⭐ */
.score-display {
    background: rgba(0, 245, 255, 0.1);
    padding: 8px 20px;
    border-radius: 50px;
    border: 1px solid var(--primary);
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 0 15px rgba(0, 245, 255, 0.2);
}

.search-box input { padding: 10px 20px; width: 200px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.05); color: white; outline: none; }
.hero { text-align: center; padding: 60px 20px; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 40px 100px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
.game-card {
  background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px;
  padding: 40px 30px; text-align: center; position: relative; transition: 0.4s; cursor: pointer;
}
.game-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 245, 255, 0.2); }
.game-icon { font-size: 60px; margin-bottom: 20px; display: block; }
.game-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
.game-desc { font-size: 14px; color: rgba(255, 255, 255, 0.5); }
.badge { position: absolute; top: 15px; right: 15px; padding: 5px 12px; border-radius: 12px; font-size: 11px; font-weight: bold; }
.badge-hot { background: #ff4757; }
.badge-new { background: #2ed573; }
#toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: white; color: #333; padding: 12px 25px; border-radius: 50px; display: none; font-weight: bold; }
footer { text-align: center; padding: 40px; opacity: 0.5; font-size: 14px; }
</style>
</head>
<body>
<header>
  <div class="logo">🎮 HP GAME</div>
  <div style="display: flex; align-items: center; gap: 20px;">
    <div class="score-display">⭐ <span id="totalScore">0</span></div>
    <div class="search-box"><input type="text" placeholder="Tìm kiếm..." id="searchInput"></div>
  </div>
</header>

<section class="hero">
  <h1>Level Up Your Fun!</h1>
  <p>Kho tàng mini game cực đỉnh của HP Studio.</p>
</section>

<div class="container" id="gameGrid">
  <div class="game-card" onclick="playGame('rankdash.html')">
    <span class="badge badge-hot">Hot</span>
    <div class="game-icon">🟥</div>
    <div class="game-title">Rank Dash</div>
    <div class="game-desc">Vượt chướng ngại vật cực nhanh!</div>
  </div>

  <div class="game-card" onclick="playGame('lineline.html')">
    <span class="badge badge-new">New</span>
    <div class="game-icon">💣</div>
    <div class="game-title">Dò Mìn</div>
    <div class="game-desc">Tìm bom và thử thách trí tuệ.</div>
  </div>

  <div class="game-card" onclick="playGame('neon-bird.html')">
    <span class="badge badge-new">New</span>
    <div class="game-icon">🐦</div>
    <div class="game-title">Neon Bird</div>
    <div class="game-desc">Chinh phục 999đ để nhận thưởng ⭐</div>
  </div>

  <div class="game-card" onclick="comingSoon('Rắn Săn Mồi')">
    <div class="game-icon">🐍</div>
    <div class="game-title">Rắn Săn Mồi</div>
    <div class="game-desc">Sắp ra mắt...</div>
  </div>
</div>

<div id="toast"></div>
<footer><p>© 2026 HP Game Studio | Designed with ❤️</p></footer>

<script>
  function updateScore() {
    const score = localStorage.getItem('hp_game_points') || 0;
    document.getElementById('totalScore').innerText = score;
  }

  function playGame(url) { window.location.href = url; }
  
  function comingSoon(name) {
    const t = document.getElementById('toast');
    t.innerText = "🎮 Game " + name + " đang phát triển!";
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
  }

  document.getElementById('searchInput').addEventListener('input', function(e) {
    const term = e.target.value.toLowerCase();
    document.querySelectorAll('.game-card').forEach(card => {
      const title = card.querySelector('.game-title').innerText.toLowerCase();
      card.style.display = title.includes(term) ? 'block' : 'none';
    });
  });

  window.onload = updateScore;
</script>
</body>
</html>
